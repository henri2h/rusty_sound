name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  build-desktop:
    name: Desktop Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: desktop-

      - name: Build desktop binary
        run: cargo build --release --bin rusty_sound_desktop

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: rusty-sound-desktop-linux
          path: target/release/rusty_sound_desktop
          if-no-files-found: error

  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and platform
        run: |
          sdkmanager "ndk;27.0.12077973"
          sdkmanager "platforms;android-36"

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-

      - name: Build debug APK
        run: |
          cd AndroidApp
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rusty-sound-debug-apk
          path: AndroidApp/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
